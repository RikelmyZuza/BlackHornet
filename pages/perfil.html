<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Black Hornet Coffee</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header>
    <div class="logo">
        <a href="../index.html">
            <img src="../img/logo.jpeg" alt="Logo Black Hornet Coffee">
            <div class="logo-texto">
                <span class="nome">Black Hornet</span>
                <span class="sub">Coffee</span>
            </div>
        </a>
    </div>
    <nav class="menu">
        <a href="../index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="receitas.html">Receitas</a>
        <a href="contato.html">Contato</a>
        <a href="perfil.html" class="ativo">
            <div class="icone-login">
                <img src="../img/Login.png" alt="Meu Perfil">
            </div>
        </a>
    </nav>
</header>

<!-- ── PÁGINA DE PERFIL ── -->
<div class="perfil-page">

    <!-- Card principal do perfil -->
    <div class="perfil-card">

        <!-- Faixa decorativa no topo (herdada do CSS) -->

        <!-- Avatar com iniciais gerado pelo JS -->
        <div class="perfil-avatar-wrap">
            <div class="perfil-avatar" id="perfilAvatar">??</div>
        </div>

        <!-- Nome e e-mail do usuário -->
        <div class="perfil-info">
            <h2 id="perfilNome">Carregando…</h2>
            <p id="perfilEmail" class="perfil-email">—</p>
            <span class="perfil-badge">Membro Black Hornet</span>
        </div>

        <!-- Divisor -->
        <div class="perfil-divisor"></div>

        <!-- Detalhes da conta -->
        <div class="perfil-detalhes">
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">Nome completo</span>
                <span class="perfil-detalhe-valor" id="detalheNome">—</span>
            </div>
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">E-mail</span>
                <span class="perfil-detalhe-valor" id="detalheEmail">—</span>
            </div>
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">Membro desde</span>
                <span class="perfil-detalhe-valor" id="detalheMembro">—</span>
            </div>
        </div>

        <!-- Botão de sair -->
        <button class="perfil-btn-sair" onclick="sairDaConta()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair da conta
        </button>

    </div>
</div>

<script src="../js/perfil.js"></script>
</body>
</html>
