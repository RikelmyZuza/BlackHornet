<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Black Hornet Coffee</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/perfil.css">
</head>
<body>

<!-- ── HEADER ── -->
<header>
    <div class="logo">
        <a href="../index.html">
            <img src="../img/logo.jpeg" alt="Logo Black Hornet Coffee">
            <div class="logo-texto">
                <span class="nome">Black Hornet</span>
                <span class="sub">Coffee</span>
            </div>
        </a>
    </div>
    <nav class="menu">
        <a href="../index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="receitas.html">Receitas</a>
        <a href="contato.html">Contato</a>
        <!-- Ícone de favoritos (visível quando logado) -->
        <div class="icone-favoritos">
            <a href="favoritos.html" title="Meus favoritos">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            </a>
        </div>
        <!-- Ícone de perfil (ativo) -->
        <a href="perfil.html" class="ativo">
            <div class="icone-login">
                <img src="../img/Login.png" alt="Meu Perfil">
            </div>
        </a>
            <div class="icone-favoritos">
                <a href="favoritos.html" title="Meus favoritos">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                </a>
            </div>
    </nav>
</header>

<!-- ── PÁGINA DE PERFIL ── -->
<div class="perfil-page">
    <div class="perfil-card">

        <div class="perfil-avatar-wrap">
            <div class="perfil-avatar" id="perfilAvatar">??</div>
        </div>

        <div class="perfil-info">
            <h2 id="perfilNome">Carregando…</h2>
            <p id="perfilEmail" class="perfil-email">—</p>
            <span class="perfil-badge">Membro Black Hornet</span>
        </div>

        <div class="perfil-divisor"></div>

        <div class="perfil-detalhes">
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">Nome completo</span>
                <span class="perfil-detalhe-valor" id="detalheNome">—</span>
            </div>
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">E-mail</span>
                <span class="perfil-detalhe-valor" id="detalheEmail">—</span>
            </div>
            <div class="perfil-detalhe-item">
                <span class="perfil-detalhe-label">Membro desde</span>
                <span class="perfil-detalhe-valor" id="detalheMembro">—</span>
            </div>
        </div>

        <button class="perfil-btn-sair" onclick="sairDaConta('login.html')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair da conta
        </button>

    </div>
</div>

<!-- auth.js ANTES de perfil.js -->
<script src="../js/auth.js" defer></script>
<script src="../js/perfil.js"></script>
</body>
</html>
