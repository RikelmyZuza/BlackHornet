<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>
    <!-- Inclua seu arquivo CSS aqui -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="login-cadastro-form">
        <!-- FORMULÁRIO DE LOGIN -->
        <div class="login-form" id="loginBox">
            <h2>Login</h2>
            <form action="#" method="POST">
                <div class="input-box">
                    <label for="email-login">E-mail</label>
                    <input type="email" id="email-login" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-box">
                    <label for="senha-login">Senha</label>
                    <input type="password" id="senha-login" placeholder="Digite sua senha" required>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <p>Já tem uma conta? <a href="#" class='btn-terciario' onclick="alternarFormulario()">cadastro</a></p>
        </div>

        <!-- FORMULÁRIO DE CADASTRO -->
        <div class="cadastro-form" id="cadastroBox" style="display: none;">
            <h2>Cadastro</h2>
            <form action="#" method="POST"> 
                <div class="input-box">
                    <label for="nome-cadastro">Nome Completo</label>
                    <input type="text" id="nome-cadastro" placeholder="Digite seu nome" required>
                </div>
                <div class="input-box">
                    <label for="email-cadastro">E-mail</label>
                    <input type="email" id="email-cadastro" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-box">
                    <label for="senha-cadastro">Senha</label>
                    <input type="password" id="senha-cadastro" placeholder="Crie uma senha" required>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <p>Já tem uma conta? <a href="#" onclick="alternarFormulario()">Faça Login</a></p>
        </div>
    </div>

    <!-- SCRIPT PARA ALTERNAR ENTRE AS TELAS -->
    <script>
        function alternarFormulario() {
            const loginBox = document.getElementById('loginBox');
            const cadastroBox = document.getElementById('cadastroBox');

            if (loginBox.style.display === 'none') {
                loginBox.style.display = 'block';
                cadastroBox.style.display = 'none';
            } else {
                loginBox.style.display = 'none';
                cadastroBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
